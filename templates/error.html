{% extends "base.html" %}
{% block title %}Ошибка {{ code }}{% endblock %}
{% block content %}
<section class="section">
  <div class="container error-page">
    <div>
      <div class="code">{{ code }}</div>
      <h2 style="margin:10px 0 16px">{{ message }}</h2>
      <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fa-solid fa-house"></i> На главную</a>
    </div>
  </div>
</section>
{% endblock %}
